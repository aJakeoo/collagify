<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collagify</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #FFFFFF;
    color: #2C2C2C;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn {
    background: #2C2C2C;
    color: #FFFFFF;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: -0.01em;
    -webkit-appearance: none;
    appearance: none;
  }
  .btn:hover  { opacity: 0.75; }
  .btn:active { opacity: 0.55; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── Landing ── */
  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #landing h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  /* ── Upload ── */
  #upload {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 560px;
    padding: 24px;
  }
  #upload h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  #dropzone {
    width: 100%;
    min-height: 220px;
    background: rgba(200,200,200,0.3);
    border: 2px dashed rgba(44,44,44,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    padding: 32px;
    text-align: center;
  }
  #dropzone.dragover {
    background: rgba(200,200,200,0.5);
    border-color: #2C2C2C;
  }
  #dropzone svg  { opacity: 0.3; }
  #dropzone p    { font-size: 15px; color: #555; line-height: 1.5; }
  #dropzone p strong { color: #2C2C2C; }
  #file-count { font-size: 13px; color: #888; }

  /* ── Player ── */
  #player-view {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 960px;
    padding: 24px;
    gap: 20px;
  }

  /* Progress */
  #progress-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #progress-label { font-size: 14px; color: #555; letter-spacing: 0.01em; }
  #progress-bar-track {
    width: 100%;
    height: 4px;
    background: rgba(44,44,44,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #2C2C2C;
    border-radius: 2px;
    transition: width 0.25s ease;
  }

  /* Video */
  #video-wrap { width: 100%; display: none; }
  video { width: 100%; border-radius: 12px; background: #f5f5f5; display: block; }

  /* Controls */
  #controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* Options panel */
  #options-panel {
    display: none;
    flex-direction: column;
    gap: 16px;
    background: rgba(200,200,200,0.25);
    border-radius: 16px;
    padding: 24px 28px;
    width: 100%;
    max-width: 480px;
  }
  #options-panel h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .opt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .opt-row label { font-size: 14px; color: #444; white-space: nowrap; }
  .opt-row input[type=range] { flex: 1; accent-color: #2C2C2C; }
  .opt-row input[type=text] {
    flex: 1;
    background: #FFFFFF;
    border: 1px solid rgba(44,44,44,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    color: #2C2C2C;
    font-family: inherit;
    outline: none;
    min-width: 0;
  }
  .opt-row input[type=text]::placeholder { color: #bbb; }
  .opt-row select {
    background: #FFFFFF;
    border: 1px solid rgba(44,44,44,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    color: #2C2C2C;
    cursor: pointer;
  }
  .opt-val { font-size: 13px; color: #888; min-width: 42px; text-align: right; }

  /* Feature error / info banners */
  .banner {
    border-radius: 12px;
    padding: 18px 22px;
    max-width: 480px;
    font-size: 14px;
    line-height: 1.6;
    text-align: center;
    display: none;
  }
  .banner-error { background: #fff3f3; border: 1px solid #fcc; color: #555; }
  .banner-info  { background: #f5f5f5; border: 1px solid #e0e0e0; color: #666; }

  #start-over {
    font-size: 13px;
    color: #bbb;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  #start-over:hover { color: #666; }

  #btn-render { background: #1A6EF5; }
  #btn-render:hover { opacity: 0.82; }

  #file-input, #music-input { display: none; }
</style>
</head>
<body>

<!-- STATE 1: LANDING -->
<div id="landing">
  <h1>Collagify</h1>
  <button class="btn" id="btn-start">Collage Video</button>
</div>

<!-- STATE 2: UPLOAD -->
<div id="upload">
  <h2>Choose your photos</h2>
  <button class="btn" id="btn-render" disabled>Build Collage</button>
  <div id="dropzone" tabindex="0" role="button" aria-label="Upload images">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2C2C2C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 16 12 12 8 16"/>
      <line x1="12" y1="12" x2="12" y2="21"/>
      <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
    </svg>
    <p><strong>Click to choose files</strong> or drag and drop here</p>
    <p style="font-size:13px;color:#aaa">JPG · PNG · HEIC · up to 200 images</p>
  </div>
  <span id="file-count"></span>
  <button class="btn" id="btn-choose">Choose Files</button>
  <input type="file" id="file-input" accept="image/jpeg,image/png,image/heic,image/heif,.heic,.heif,.jpg,.jpeg,.png" multiple>
</div>

<!-- STATE 3: PLAYER / RENDER -->
<div id="player-view">
  <div id="progress-wrap">
    <span id="progress-label">Preparing…</span>
    <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
  </div>

  <div id="banner-error" class="banner banner-error"></div>
  <div id="banner-info"  class="banner banner-info"></div>

  <div id="video-wrap">
    <video id="video" controls playsinline webkit-playsinline></video>
  </div>

  <div id="controls">
    <button class="btn" id="btn-options">Options</button>
    <button class="btn" id="btn-add-music">Add Music</button>
    <button class="btn" id="btn-download" style="display:none">Download MP4</button>
    <button class="btn" id="btn-rebuild" style="display:none">Rebuild</button>
  </div>

  <div id="options-panel">
    <h3>Options</h3>
    <div class="opt-row">
      <label>Video name</label>
      <input type="text" id="opt-title" placeholder="Optional" maxlength="60">
    </div>
    <div class="opt-row">
      <label>Slide duration</label>
      <input type="range" id="opt-slide-dur" min="1" max="10" step="0.5" value="4">
      <span class="opt-val" id="val-slide-dur">4s</span>
    </div>
    <div class="opt-row">
      <label>Transition type</label>
      <select id="opt-trans-type">
        <option value="kenburns">Ken Burns</option>
        <option value="dissolve">Dissolve</option>
        <option value="push">Push</option>
      </select>
    </div>
    <div class="opt-row">
      <label>Transition duration</label>
      <input type="range" id="opt-trans-dur" min="0.2" max="2" step="0.1" value="0.8">
      <span class="opt-val" id="val-trans-dur">0.8s</span>
    </div>
    <div class="opt-row">
      <label>Resolution</label>
      <select id="opt-res">
        <option value="1080">1080p</option>
        <option value="2160">4K</option>
      </select>
    </div>
    <div class="opt-row">
      <label>Aspect ratio</label>
      <select id="opt-aspect">
        <option value="16:9">16:9 Landscape</option>
        <option value="9:16">9:16 Portrait</option>
        <option value="1:1">1:1 Square</option>
        <option value="4:3">4:3 Classic</option>
      </select>
    </div>
    <div class="opt-row">
      <label>Order</label>
      <select id="opt-order">
        <option value="preserve">Preserve</option>
        <option value="shuffle">Shuffle</option>
      </select>
    </div>
    <div class="opt-row" id="music-vol-row" style="display:none">
      <label>Music volume</label>
      <input type="range" id="opt-music-vol" min="0" max="1" step="0.05" value="0.8">
      <span class="opt-val" id="val-music-vol">80%</span>
    </div>
  </div>

  <button id="start-over">Start over</button>
  <input type="file" id="music-input" accept="audio/mpeg,audio/aac,audio/mp4,audio/x-m4a,.mp3,.aac,.m4a">
</div>

<script>
// ── Ken Burns patterns (4 directions, cycled per slide) ──────────────────
const KB = [
  { zoomIn: true,  panX:  1, panY:  1 },
  { zoomIn: false, panX: -1, panY: -1 },
  { zoomIn: true,  panX: -1, panY:  1 },
  { zoomIn: false, panX:  1, panY: -1 },
];

// ── State ────────────────────────────────────────────────────────────────
let selectedFiles  = [];
let musicFile      = null;
let outputBlob     = null;
let outputMime     = 'video/mp4';
let rendering      = false;
let activeAudioCtx = null;

// ── DOM helpers ───────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const landing      = $('landing');
const uploadView   = $('upload');
const playerView   = $('player-view');
const dropzone     = $('dropzone');
const fileInput    = $('file-input');
const musicInput   = $('music-input');
const fileCount    = $('file-count');
const btnStart     = $('btn-start');
const btnChoose    = $('btn-choose');
const btnRender    = $('btn-render');
const btnOptions   = $('btn-options');
const btnAddMusic  = $('btn-add-music');
const btnDownload  = $('btn-download');
const btnRebuild   = $('btn-rebuild');
const btnStartOver = $('start-over');
const optPanel     = $('options-panel');
const progressWrap = $('progress-wrap');
const progressFill = $('progress-bar-fill');
const progressLbl  = $('progress-label');
const videoWrap    = $('video-wrap');
const video        = $('video');
const musicVolRow  = $('music-vol-row');
const bannerError  = $('banner-error');
const bannerInfo   = $('banner-info');
const optSlideDur  = $('opt-slide-dur');
const optTransDur  = $('opt-trans-dur');
const optRes       = $('opt-res');
const optOrder     = $('opt-order');
const optMusicVol  = $('opt-music-vol');
const valSlideDur  = $('val-slide-dur');
const valTransDur  = $('val-trans-dur');
const valMusicVol  = $('val-music-vol');

// ── Navigation ─────────────────────────────────────────────────────────────
function showState(s) {
  landing.style.display    = s === 'landing' ? 'flex' : 'none';
  uploadView.style.display = s === 'upload'  ? 'flex' : 'none';
  playerView.style.display = s === 'player'  ? 'flex' : 'none';
}

btnStart.onclick = () => showState('upload');

btnStartOver.onclick = () => {
  selectedFiles = [];
  musicFile     = null;
  outputBlob    = null;
  fileCount.textContent    = '';
  btnRender.disabled       = true;
  videoWrap.style.display  = 'none';
  progressWrap.style.display = 'flex';
  btnDownload.style.display = 'none';
  btnRebuild.style.display = 'none';
  optPanel.style.display   = 'none';
  musicVolRow.style.display = 'none';
  bannerError.style.display = 'none';
  bannerInfo.style.display  = 'none';
  btnAddMusic.textContent  = 'Add Music';
  if (activeAudioCtx) { try { activeAudioCtx.close(); } catch {} activeAudioCtx = null; }
  showState('landing');
};

// ── File selection ─────────────────────────────────────────────────────────
dropzone.onclick   = () => fileInput.click();
dropzone.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); };
btnChoose.onclick  = () => fileInput.click();
dropzone.ondragover  = e => { e.preventDefault(); dropzone.classList.add('dragover'); };
dropzone.ondragleave = ()  => dropzone.classList.remove('dragover');
dropzone.ondrop      = e  => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFiles([...e.dataTransfer.files]);
};
fileInput.onchange = () => handleFiles([...fileInput.files]);

function handleFiles(files) {
  const imgs = files.filter(f =>
    /image\/(jpeg|png|heic|heif)/i.test(f.type) ||
    /\.(jpe?g|png|heic|heif)$/i.test(f.name)
  );
  if (!imgs.length) return;
  selectedFiles = imgs.slice(0, 200);
  fileCount.textContent = `${selectedFiles.length} image${selectedFiles.length !== 1 ? 's' : ''} selected`;
  btnRender.disabled = false;
}

btnRender.onclick = startRender;

// ── Music ──────────────────────────────────────────────────────────────────
btnAddMusic.onclick = () => musicInput.click();
musicInput.onchange = () => {
  if (musicInput.files[0]) {
    musicFile = musicInput.files[0];
    const name = musicFile.name.replace(/\.[^.]+$/, '');
    btnAddMusic.textContent = '♪ ' + (name.length > 18 ? name.slice(0, 18) + '…' : name);
    musicVolRow.style.display = 'flex';
  }
};

// ── Options ────────────────────────────────────────────────────────────────
btnOptions.onclick = () => {
  optPanel.style.display = optPanel.style.display === 'flex' ? 'none' : 'flex';
};
optSlideDur.oninput = () => { valSlideDur.textContent = optSlideDur.value + 's'; };
optTransDur.oninput = () => { valTransDur.textContent = optTransDur.value + 's'; };
optMusicVol.oninput = () => { valMusicVol.textContent = Math.round(optMusicVol.value * 100) + '%'; };

// ── Progress bar ───────────────────────────────────────────────────────────
function setProgress(frac) {
  progressFill.style.width = Math.min(100, Math.round(frac * 100)) + '%';
}

// ── MIME type detection ────────────────────────────────────────────────────
function bestMimeType() {
  if (typeof MediaRecorder === 'undefined') return null;
  const candidates = [
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
    'video/mp4;codecs=avc1',
    'video/mp4',
    'video/webm;codecs=vp8,opus',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  for (const t of candidates) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return ''; // let browser decide
}

// ── Image loading ──────────────────────────────────────────────────────────
function loadImg(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode: ' + file.name)); };
    img.src = url;
  });
}

// ── Pre-render blurred background ─────────────────────────────────────────
// Two-pass: draw image into a mid-size canvas, then blur+downsample into the
// final tiny canvas. When that tiny canvas is upscaled 12x at draw time, the
// combined effect is a heavy, smooth blur with no per-frame filter cost.
function makeBg(img, bW, bH) {
  const iw = img.naturalWidth, ih = img.naturalHeight;

  // Pass 1: draw at 3x final size so the blur kernel has something to work with
  const mid = document.createElement('canvas');
  mid.width = bW * 3; mid.height = bH * 3;
  const mctx = mid.getContext('2d');
  const s1 = Math.max(mid.width / iw, mid.height / ih);
  mctx.filter = 'brightness(0.5)';
  mctx.drawImage(img, (mid.width - iw * s1) / 2, (mid.height - ih * s1) / 2, iw * s1, ih * s1);

  // Pass 2: blur+shrink into the final tiny canvas
  const c = document.createElement('canvas');
  c.width = bW; c.height = bH;
  const cx = c.getContext('2d');
  cx.imageSmoothingEnabled = true;
  cx.imageSmoothingQuality = 'high';
  cx.filter = 'blur(6px)';
  cx.drawImage(mid, 0, 0, bW, bH);
  return c;
}

// ── Draw title text on first slide ────────────────────────────────────────
function drawTitle(ctx, text, W, H, alpha) {
  if (!text || alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  const fs = Math.max(24, Math.round(H / 18));
  ctx.font = `500 ${fs}px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur  = fs * 0.7;
  ctx.shadowOffsetY = fs * 0.04;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fillText(text, W / 2, H - fs * 1.4, W * 0.82);
  ctx.restore();
}

// ── Resolve canvas dimensions from resolution + aspect ratio settings ──────
function outputDimensions() {
  const base = parseInt($('opt-res').value); // short-side reference
  const [aw, ah] = $('opt-aspect').value.split(':').map(Number);
  const scale = base / Math.min(aw, ah);
  return {
    W: Math.round(aw * scale / 2) * 2,
    H: Math.round(ah * scale / 2) * 2,
  };
}

// ── Draw one slide at a specific Ken Burns progress [0..1] ─────────────────
function drawSlide(ctx, img, bg, W, H, kb, kbProgress, alpha) {
  const scale = kb.zoomIn ? 1.0 + 0.08 * kbProgress : 1.08 - 0.08 * kbProgress;
  const panX  = kb.panX * 0.03 * W * kbProgress;
  const panY  = kb.panY * 0.02 * H * kbProgress;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // Background: the tiny thumbnail scaled to over-fill the frame
  const bgW = W * scale * 1.25;
  const bgH = H * scale * 1.25;
  ctx.drawImage(bg, (W - bgW) / 2 + panX, (H - bgH) / 2 + panY, bgW, bgH);

  // Foreground: fit-contain with Ken Burns transform
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const fg = Math.min(W / iw, H / ih) * scale;
  const fW = iw * fg, fH = ih * fg;
  ctx.drawImage(img, (W - fW) / 2 + panX, (H - fH) / 2 + panY, fW, fH);

  ctx.restore();
}

// ── Draw a static (no Ken Burns) slide ────────────────────────────────────
function drawStaticSlide(ctx, img, bg, W, H, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(bg, (W - W * 1.05) / 2, (H - H * 1.05) / 2, W * 1.05, H * 1.05);
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const s  = Math.min(W / iw, H / ih);
  ctx.drawImage(img, (W - iw * s) / 2, (H - ih * s) / 2, iw * s, ih * s);
  ctx.restore();
}

// ── Composite frame at elapsed time t ─────────────────────────────────────
// Timeline: each slot = slideDur + transDur.
// Within each slot: [0, slideDur] = pure slide; [slideDur, slideDur+transDur] = transition.
function drawAtTime(ctx, imgs, bgs, W, H, t, slideDur, transDur, transType, titleText) {
  const N      = imgs.length;
  const period = slideDur + transDur;
  const total  = N * slideDur + (N - 1) * transDur;
  t = Math.max(0, Math.min(t, total));

  const slot  = Math.min(Math.floor(t / period), N - 1);
  const local = t - slot * period;

  ctx.clearRect(0, 0, W, H);

  if (transType === 'dissolve') {
    if (local < slideDur) {
      drawStaticSlide(ctx, imgs[slot], bgs[slot], W, H, 1);
    } else if (slot < N - 1) {
      const tp = (local - slideDur) / transDur;
      drawStaticSlide(ctx, imgs[slot],     bgs[slot],     W, H, 1);
      drawStaticSlide(ctx, imgs[slot + 1], bgs[slot + 1], W, H, tp);
    } else {
      drawStaticSlide(ctx, imgs[N - 1], bgs[N - 1], W, H, 1);
    }
  } else if (transType === 'push') {
    if (local < slideDur) {
      drawStaticSlide(ctx, imgs[slot], bgs[slot], W, H, 1);
    } else if (slot < N - 1) {
      const tp   = (local - slideDur) / transDur;
      const edge = W * (1 - tp);
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, edge, H); ctx.clip();
      ctx.translate(-W * tp, 0);
      drawStaticSlide(ctx, imgs[slot], bgs[slot], W, H, 1);
      ctx.restore();
      ctx.save();
      ctx.beginPath(); ctx.rect(edge, 0, W - edge, H); ctx.clip();
      ctx.translate(edge, 0);
      drawStaticSlide(ctx, imgs[slot + 1], bgs[slot + 1], W, H, 1);
      ctx.restore();
    } else {
      drawStaticSlide(ctx, imgs[N - 1], bgs[N - 1], W, H, 1);
    }
  } else {
    // Ken Burns (default)
    const kbDir = KB[slot % KB.length];
    if (local < slideDur) {
      drawSlide(ctx, imgs[slot], bgs[slot], W, H, kbDir, local / slideDur, 1);
    } else if (slot < N - 1) {
      const tp      = (local - slideDur) / transDur;
      const nextDir = KB[(slot + 1) % KB.length];
      drawSlide(ctx, imgs[slot],     bgs[slot],     W, H, kbDir,   1,  1);
      drawSlide(ctx, imgs[slot + 1], bgs[slot + 1], W, H, nextDir, 0, tp);
    } else {
      drawSlide(ctx, imgs[N - 1], bgs[N - 1], W, H, KB[(N - 1) % KB.length], 1, 1);
    }
  }

  // Title on first slide: fade in over 0.5 s, visible for full slide, gone at transition
  if (slot === 0 && local < slideDur) {
    drawTitle(ctx, titleText, W, H, Math.min(1, local / 0.5));
  }
}

// ── Main render ────────────────────────────────────────────────────────────
async function startRender() {
  if (rendering || !selectedFiles.length) return;
  rendering = true;

  showState('player');
  progressWrap.style.display  = 'flex';
  videoWrap.style.display     = 'none';
  bannerError.style.display   = 'none';
  bannerInfo.style.display    = 'none';
  btnRebuild.style.display    = 'none';
  btnDownload.style.display   = 'none';
  setProgress(0);
  progressLbl.textContent     = 'Decoding images…';

  // Clean up any leftover AudioContext from a previous render
  if (activeAudioCtx) { try { activeAudioCtx.close(); } catch {} activeAudioCtx = null; }

  // Feature check
  if (typeof MediaRecorder === 'undefined') {
    bannerError.innerHTML = 'MediaRecorder is not supported in this browser. Try Chrome, Firefox, or Safari 14.1+.';
    bannerError.style.display = 'block';
    progressWrap.style.display = 'none';
    rendering = false;
    return;
  }

  // Sort / shuffle
  let files = [...selectedFiles];
  if (optOrder.value === 'shuffle') {
    for (let i = files.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [files[i], files[j]] = [files[j], files[i]];
    }
  }

  // Decode images
  const imgs = [];
  for (let i = 0; i < files.length; i++) {
    try {
      imgs.push(await loadImg(files[i]));
    } catch (e) {
      console.warn('Skipped:', files[i].name, e);
    }
    setProgress(0.12 * (i + 1) / files.length);
  }

  if (!imgs.length) {
    bannerError.innerHTML = 'No images could be decoded. Try JPG or PNG files.';
    bannerError.style.display = 'block';
    progressWrap.style.display = 'none';
    rendering = false;
    return;
  }

  // Settings
  const { W, H } = outputDimensions();
  const fps        = 30;

  // Pre-render blurred backgrounds at correct aspect ratio (~1/12 output res)
  const bgW = Math.round(W / 12 / 2) * 2;
  const bgH = Math.round(H / 12 / 2) * 2;
  const bgs = imgs.map(img => makeBg(img, bgW, bgH));
  const slideDur   = parseFloat(optSlideDur.value);
  const transDur   = parseFloat(optTransDur.value);
  const transType  = $('opt-trans-type').value;
  const titleText  = $('opt-title').value.trim();
  const totalDur   = imgs.length * slideDur + Math.max(0, imgs.length - 1) * transDur;

  // Off-screen canvas (position off-viewport to avoid display issues on some browsers)
  const canvas = document.createElement('canvas');
  canvas.width  = W;
  canvas.height = H;
  canvas.style.cssText = 'position:fixed;top:-9999px;left:-9999px;pointer-events:none;opacity:0';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  // Draw frame 0 before captureStream so first frame isn't blank
  drawAtTime(ctx, imgs, bgs, W, H, 0, slideDur, transDur, transType, titleText);

  // Capture stream
  let stream;
  try {
    stream = (canvas.captureStream || canvas.webkitCaptureStream).call(canvas, fps);
  } catch (e) {
    bannerError.innerHTML = 'Canvas video capture isn\'t available in this browser.<br>Please use Chrome, Firefox, or Safari 14.1+ on iOS.';
    bannerError.style.display = 'block';
    progressWrap.style.display = 'none';
    canvas.remove();
    rendering = false;
    return;
  }

  // ── Web Audio (music) ───────────────────────────────────────────────────
  let audioCtx = null;
  if (musicFile) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      activeAudioCtx = audioCtx;
      await audioCtx.resume();

      const raw    = await musicFile.arrayBuffer();
      const abuf   = await audioCtx.decodeAudioData(raw);
      const gain   = audioCtx.createGain();
      const dest   = audioCtx.createMediaStreamDestination();
      const source = audioCtx.createBufferSource();

      gain.gain.value = parseFloat(optMusicVol.value);
      source.buffer   = abuf;
      source.loop     = true;
      source.connect(gain);
      gain.connect(dest);

      // Add audio track into the canvas stream
      dest.stream.getAudioTracks().forEach(t => stream.addTrack(t));

      audioCtx._source = source;
      audioCtx._gain   = gain;
      audioCtx._vol    = parseFloat(optMusicVol.value);
    } catch (e) {
      console.warn('Audio setup failed, continuing video-only:', e);
      audioCtx = null;
      activeAudioCtx = null;
    }
  }

  // ── MediaRecorder ───────────────────────────────────────────────────────
  const mime   = bestMimeType();
  const chunks = [];
  let recorder;
  try {
    recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  } catch {
    try { recorder = new MediaRecorder(stream); } catch (e2) {
      bannerError.innerHTML = 'MediaRecorder failed to initialize.<br>' + e2.message;
      bannerError.style.display = 'block';
      progressWrap.style.display = 'none';
      canvas.remove();
      rendering = false;
      return;
    }
  }

  recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };

  recorder.onstop = () => {
    const outMime = recorder.mimeType || 'video/mp4';
    outputBlob    = new Blob(chunks, { type: outMime });
    outputMime    = outMime;

    const url = URL.createObjectURL(outputBlob);
    video.src = url;
    video.load();
    video.play().catch(() => {});

    const ext = outMime.includes('webm') ? 'WebM' : 'MP4';
    btnDownload.textContent    = 'Download ' + ext;
    btnDownload.style.display  = 'inline-block';
    progressWrap.style.display = 'none';
    videoWrap.style.display    = 'block';
    btnRebuild.style.display   = 'inline-block';

    if (audioCtx) { try { audioCtx.close(); } catch {} activeAudioCtx = null; }
    canvas.remove();
    rendering = false;
  };

  // ── Start ───────────────────────────────────────────────────────────────
  recorder.start(250); // collect every 250 ms

  if (audioCtx && audioCtx._source) {
    audioCtx._source.start(0);
    const now      = audioCtx.currentTime;
    const vol      = audioCtx._vol;
    const fadeAt   = now + Math.max(0, totalDur - 2);
    audioCtx._gain.gain.setValueAtTime(vol, now);
    audioCtx._gain.gain.setValueAtTime(vol, fadeAt);
    audioCtx._gain.gain.linearRampToValueAtTime(0, now + totalDur + 0.15);
  }

  // Note to user that recording runs in real-time
  bannerInfo.innerHTML = 'Recording runs in real-time. Keep this tab active until it finishes.';
  bannerInfo.style.display = 'block';

  // ── Animation loop ──────────────────────────────────────────────────────
  const t0 = performance.now();

  function tick(now) {
    const elapsed = (now - t0) / 1000;

    if (elapsed >= totalDur) {
      drawAtTime(ctx, imgs, bgs, W, H, totalDur, slideDur, transDur, transType, titleText);
      if (audioCtx && audioCtx._source) {
        try { audioCtx._source.stop(audioCtx.currentTime + 0.2); } catch {}
      }
      recorder.stop();
      stream.getTracks().forEach(t => t.stop());
      return;
    }

    drawAtTime(ctx, imgs, bgs, W, H, elapsed, slideDur, transDur, transType, titleText);

    const rem  = Math.ceil(totalDur - elapsed);
    const mins = Math.floor(rem / 60);
    const secs = rem % 60;
    progressLbl.textContent = mins > 0
      ? `Recording… ${mins}:${String(secs).padStart(2, '0')} remaining`
      : `Recording… ${secs}s remaining`;
    setProgress(0.12 + 0.86 * elapsed / totalDur);

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

// ── Rebuild ────────────────────────────────────────────────────────────────
btnRebuild.onclick = () => {
  videoWrap.style.display    = 'none';
  progressWrap.style.display = 'flex';
  bannerError.style.display  = 'none';
  bannerInfo.style.display   = 'none';
  optPanel.style.display     = 'none';
  startRender();
};

// ── Download ───────────────────────────────────────────────────────────────
btnDownload.onclick = () => {
  if (!outputBlob) return;
  const ext      = outputMime.includes('webm') ? 'webm' : 'mp4';
  const rawName  = $('opt-title').value.trim();
  const safeName = rawName.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-');
  const filename = (safeName ? safeName + '-' : '') + 'collagify.' + ext;
  const a        = document.createElement('a');
  a.href         = URL.createObjectURL(outputBlob);
  a.download     = filename;
  a.click();
};
</script>
</body>
</html>
