<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collagify</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #FFFFFF;
    color: #2C2C2C;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn {
    background: #2C2C2C;
    color: #FFFFFF;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    letter-spacing: -0.01em;
  }
  .btn:hover { opacity: 0.8; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── STATE 1: LANDING ── */
  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #landing h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: #2C2C2C;
  }

  /* ── STATE 2: UPLOAD ── */
  #upload {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 560px;
    padding: 24px;
  }
  #upload h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  #dropzone {
    width: 100%;
    min-height: 240px;
    background: rgba(200,200,200,0.3);
    backdrop-filter: blur(8px);
    border: 2px dashed rgba(44,44,44,0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    padding: 32px;
    text-align: center;
  }
  #dropzone.dragover {
    background: rgba(200,200,200,0.55);
    border-color: #2C2C2C;
  }
  #dropzone svg { opacity: 0.35; }
  #dropzone p {
    font-size: 15px;
    color: #555;
    line-height: 1.5;
  }
  #dropzone p strong { color: #2C2C2C; }
  #file-count {
    font-size: 13px;
    color: #888;
  }

  /* ── STATE 3: RENDER / PLAYER ── */
  #player-view {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 960px;
    padding: 24px;
    gap: 20px;
  }

  /* progress */
  #progress-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #progress-label {
    font-size: 14px;
    color: #555;
    letter-spacing: 0.01em;
  }
  #progress-bar-track {
    width: 100%;
    height: 4px;
    background: rgba(44,44,44,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #2C2C2C;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* video */
  #video-wrap { width: 100%; display: none; }
  video {
    width: 100%;
    border-radius: 12px;
    background: #111;
    display: block;
  }

  /* controls bar */
  #controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* options panel */
  #options-panel {
    display: none;
    flex-direction: column;
    gap: 16px;
    background: rgba(200,200,200,0.25);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 24px 28px;
    width: 100%;
    max-width: 480px;
  }
  #options-panel h3 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .opt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .opt-row label {
    font-size: 14px;
    color: #444;
    white-space: nowrap;
  }
  .opt-row input[type=range] { flex: 1; accent-color: #2C2C2C; }
  .opt-row select {
    background: #fff;
    border: 1px solid rgba(44,44,44,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    color: #2C2C2C;
    cursor: pointer;
  }
  .opt-val { font-size: 13px; color: #888; min-width: 36px; text-align: right; }

  /* start-over */
  #start-over {
    font-size: 13px;
    color: #aaa;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  #start-over:hover { color: #555; }

  /* hidden file input */
  #file-input { display: none; }
  #music-input { display: none; }
</style>
</head>
<body>

<!-- STATE 1: LANDING -->
<div id="landing">
  <h1>Collagify</h1>
  <button class="btn" id="btn-start">Collage Video</button>
</div>

<!-- STATE 2: UPLOAD -->
<div id="upload">
  <h2>Choose your photos</h2>
  <div id="dropzone" tabindex="0" role="button" aria-label="Upload images">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#2C2C2C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 16 12 12 8 16"></polyline>
      <line x1="12" y1="12" x2="12" y2="21"></line>
      <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
    </svg>
    <p><strong>Click to choose files</strong> or drag and drop here</p>
    <p style="font-size:13px;color:#aaa;">JPG, PNG, HEIC — up to 60 images</p>
  </div>
  <span id="file-count"></span>
  <button class="btn" id="btn-choose">Choose Files</button>
  <button class="btn" id="btn-render" style="display:none;">Build Collage</button>
  <input type="file" id="file-input" accept="image/jpeg,image/png,image/heic,image/heif,.heic,.heif" multiple>
</div>

<!-- STATE 3: RENDER / PLAYER -->
<div id="player-view">
  <div id="progress-wrap">
    <span id="progress-label">Building your collage…</span>
    <div id="progress-bar-track"><div id="progress-bar-fill"></div></div>
  </div>

  <div id="video-wrap">
    <video id="video" controls playsinline></video>
  </div>

  <div id="controls">
    <button class="btn" id="btn-options">Options</button>
    <button class="btn" id="btn-add-music">Add Music</button>
    <button class="btn" id="btn-download" disabled>Download MP4</button>
    <button class="btn" id="btn-rebuild" style="display:none;">Rebuild</button>
  </div>

  <div id="options-panel">
    <h3>Options</h3>
    <div class="opt-row">
      <label>Slide duration</label>
      <input type="range" id="opt-slide-dur" min="1" max="10" step="0.5" value="4">
      <span class="opt-val" id="val-slide-dur">4s</span>
    </div>
    <div class="opt-row">
      <label>Transition</label>
      <input type="range" id="opt-trans-dur" min="0.2" max="2" step="0.1" value="0.8">
      <span class="opt-val" id="val-trans-dur">0.8s</span>
    </div>
    <div class="opt-row">
      <label>Resolution</label>
      <select id="opt-res">
        <option value="1080">1080p</option>
        <option value="2160">4K</option>
      </select>
    </div>
    <div class="opt-row">
      <label>Order</label>
      <select id="opt-order">
        <option value="preserve">Preserve</option>
        <option value="shuffle">Shuffle</option>
      </select>
    </div>
    <div class="opt-row" id="music-vol-row" style="display:none;">
      <label>Music volume</label>
      <input type="range" id="opt-music-vol" min="0" max="1" step="0.05" value="0.8">
      <span class="opt-val" id="val-music-vol">80%</span>
    </div>
  </div>

  <button id="start-over">Start over</button>
  <input type="file" id="music-input" accept="audio/mpeg,audio/aac,audio/mp4,.mp3,.aac,.m4a">
</div>

<script>
// ── ffmpeg.wasm via CDN ──────────────────────────────────────────────────
const FFMPEG_CDN = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js';
const CORE_MT   = 'https://unpkg.com/@ffmpeg/core-mt@0.12.6/dist/esm';
const CORE_ST   = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';

let ffmpeg = null;
let ffmpegLoaded = false;

async function loadFFmpeg() {
  if (ffmpegLoaded) return;
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = FFMPEG_CDN;
    s.onload = res;
    s.onerror = rej;
    document.head.appendChild(s);
  });
  const { FFmpeg } = window.FFmpegWASM || FFmpegWASM;
  ffmpeg = new FFmpeg();
  ffmpeg.on('log', ({ message }) => console.log('[ffmpeg]', message));
  ffmpeg.on('progress', ({ progress }) => {
    setProgress(0.5 + progress * 0.45); // render phase: 50-95%
  });
  // try multi-thread core first, fall back to single-thread
  try {
    await ffmpeg.load({ coreURL: CORE_MT + '/ffmpeg-core.js', wasmURL: CORE_MT + '/ffmpeg-core.wasm' });
  } catch {
    await ffmpeg.load({ coreURL: CORE_ST + '/ffmpeg-core.js', wasmURL: CORE_ST + '/ffmpeg-core.wasm' });
  }
  ffmpegLoaded = true;
}

// ── State ────────────────────────────────────────────────────────────────
let selectedFiles = [];
let musicFile = null;
let outputBlob = null;
let rendering = false;

// ── DOM refs ─────────────────────────────────────────────────────────────
const landing     = document.getElementById('landing');
const uploadView  = document.getElementById('upload');
const playerView  = document.getElementById('player-view');
const dropzone    = document.getElementById('dropzone');
const fileInput   = document.getElementById('file-input');
const musicInput  = document.getElementById('music-input');
const fileCount   = document.getElementById('file-count');
const btnStart    = document.getElementById('btn-start');
const btnChoose   = document.getElementById('btn-choose');
const btnRender   = document.getElementById('btn-render');
const btnOptions  = document.getElementById('btn-options');
const btnAddMusic = document.getElementById('btn-add-music');
const btnDownload = document.getElementById('btn-download');
const btnRebuild  = document.getElementById('btn-rebuild');
const btnStartOver= document.getElementById('start-over');
const optPanel    = document.getElementById('options-panel');
const progressWrap= document.getElementById('progress-wrap');
const progressFill= document.getElementById('progress-bar-fill');
const progressLbl = document.getElementById('progress-label');
const videoWrap   = document.getElementById('video-wrap');
const video       = document.getElementById('video');
const musicVolRow = document.getElementById('music-vol-row');

// options
const optSlideDur = document.getElementById('opt-slide-dur');
const optTransDur = document.getElementById('opt-trans-dur');
const optRes      = document.getElementById('opt-res');
const optOrder    = document.getElementById('opt-order');
const optMusicVol = document.getElementById('opt-music-vol');
const valSlideDur = document.getElementById('val-slide-dur');
const valTransDur = document.getElementById('val-trans-dur');
const valMusicVol = document.getElementById('val-music-vol');

// ── Navigation ────────────────────────────────────────────────────────────
function showState(state) {
  landing.style.display    = state === 'landing' ? 'flex' : 'none';
  uploadView.style.display = state === 'upload'  ? 'flex' : 'none';
  playerView.style.display = state === 'player'  ? 'flex' : 'none';
}

btnStart.onclick = () => showState('upload');

btnStartOver.onclick = () => {
  selectedFiles = [];
  musicFile = null;
  outputBlob = null;
  fileCount.textContent = '';
  btnRender.style.display = 'none';
  videoWrap.style.display = 'none';
  progressWrap.style.display = 'flex';
  btnDownload.disabled = true;
  btnRebuild.style.display = 'none';
  optPanel.style.display = 'none';
  musicVolRow.style.display = 'none';
  showState('landing');
};

// ── File selection ────────────────────────────────────────────────────────
dropzone.onclick = () => fileInput.click();
dropzone.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); };
btnChoose.onclick  = () => fileInput.click();

dropzone.ondragover  = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
dropzone.ondragleave = ()  => dropzone.classList.remove('dragover');
dropzone.ondrop      = (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFiles([...e.dataTransfer.files]);
};

fileInput.onchange = () => handleFiles([...fileInput.files]);

function handleFiles(files) {
  const imgs = files.filter(f => /image\/(jpeg|png|heic|heif)/i.test(f.type) || /\.(jpg|jpeg|png|heic|heif)$/i.test(f.name));
  if (!imgs.length) return;
  selectedFiles = imgs.slice(0, 60);
  fileCount.textContent = `${selectedFiles.length} image${selectedFiles.length !== 1 ? 's' : ''} selected`;
  btnRender.style.display = 'inline-block';
}

btnRender.onclick = () => startRender();

// ── Music ─────────────────────────────────────────────────────────────────
btnAddMusic.onclick = () => musicInput.click();
musicInput.onchange = () => {
  if (musicInput.files[0]) {
    musicFile = musicInput.files[0];
    btnAddMusic.textContent = '♪ ' + musicFile.name.replace(/\.[^.]+$/, '');
    musicVolRow.style.display = 'flex';
  }
};

// ── Options toggles ───────────────────────────────────────────────────────
btnOptions.onclick = () => {
  optPanel.style.display = optPanel.style.display === 'flex' ? 'none' : 'flex';
};

optSlideDur.oninput = () => { valSlideDur.textContent = optSlideDur.value + 's'; };
optTransDur.oninput = () => { valTransDur.textContent = optTransDur.value + 's'; };
optMusicVol.oninput = () => { valMusicVol.textContent = Math.round(optMusicVol.value * 100) + '%'; };

// ── Progress ──────────────────────────────────────────────────────────────
function setProgress(frac) {
  progressFill.style.width = Math.min(100, Math.round(frac * 100)) + '%';
}

// ── Image to canvas helper (handles HEIC via browser if supported) ────────
async function fileToImageBitmap(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img  = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Could not decode ' + file.name)); };
    img.src = url;
  });
}

// Draw a single slide frame: Ken Burns + blurred bg fill
function renderSlideFrame(ctx, img, W, H, progress) {
  // Ken Burns: zoom from 1.0 to 1.08 + slight pan
  const scale = 1.0 + 0.08 * progress;
  const panX  = (progress - 0.5) * 0.04 * W;
  const panY  = (progress - 0.5) * 0.02 * H;

  const iw = img.naturalWidth  || img.width;
  const ih = img.naturalHeight || img.height;

  // blurred background
  const bgScale = Math.max(W / iw, H / ih) * scale;
  const bgW = iw * bgScale, bgH = ih * bgScale;
  const bgX = (W - bgW) / 2 + panX, bgY = (H - bgH) / 2 + panY;
  ctx.filter = 'blur(28px) brightness(0.6)';
  ctx.drawImage(img, bgX, bgY, bgW, bgH);
  ctx.filter = 'none';

  // foreground: fit inside frame
  const fgScale = Math.min(W / iw, H / ih) * scale;
  const fgW = iw * fgScale, fgH = ih * fgScale;
  const fgX = (W - fgW) / 2 + panX, fgY = (H - fgH) / 2 + panY;
  ctx.drawImage(img, fgX, fgY, fgW, fgH);
}

// ── Core render ───────────────────────────────────────────────────────────
async function startRender() {
  if (rendering || !selectedFiles.length) return;
  rendering = true;

  showState('player');
  progressWrap.style.display = 'flex';
  videoWrap.style.display    = 'none';
  btnRender.style.display    = 'none';
  btnRebuild.style.display   = 'none';
  btnDownload.disabled       = true;
  setProgress(0);
  progressLbl.textContent = 'Loading ffmpeg…';

  try {
    await loadFFmpeg();
  } catch (e) {
    alert('Failed to load ffmpeg.wasm. Check your internet connection and try again.\n\n' + e);
    rendering = false;
    showState('upload');
    return;
  }

  const { fetchFile } = window.FFmpegWASM || FFmpegWASM;

  const resHeight  = parseInt(optRes.value);
  const resWidth   = resHeight === 2160 ? 3840 : 1920;
  const slideDur   = parseFloat(optSlideDur.value);
  const transDur   = parseFloat(optTransDur.value);
  const fps        = 30;
  const musicVol   = parseFloat(optMusicVol.value);

  let files = [...selectedFiles];
  if (optOrder.value === 'shuffle') {
    for (let i = files.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [files[i], files[j]] = [files[j], files[i]];
    }
  }

  progressLbl.textContent = 'Decoding images…';

  // Decode all images up front
  const imgs = [];
  for (let i = 0; i < files.length; i++) {
    try {
      const img = await fileToImageBitmap(files[i]);
      imgs.push(img);
    } catch {
      console.warn('Skipping undecodable file:', files[i].name);
    }
    setProgress(0.05 + 0.2 * (i / files.length));
  }

  if (!imgs.length) {
    alert('No images could be decoded.');
    rendering = false;
    showState('upload');
    return;
  }

  progressLbl.textContent = 'Rendering frames…';

  // Canvas-based frame renderer
  const canvas  = document.createElement('canvas');
  canvas.width  = resWidth;
  canvas.height = resHeight;
  const ctx = canvas.getContext('2d');

  const framesPerSlide = Math.round(fps * slideDur);
  const framesPerTrans = Math.round(fps * transDur);
  // Each slide contributes framesPerSlide unique frames; transitions overlap
  const totalFrames = framesPerSlide * imgs.length + framesPerTrans * Math.max(0, imgs.length - 1);

  let frameIdx = 0;
  const frameFiles = []; // names written to ffmpeg FS

  async function writeFrame(name) {
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
    const buf  = await blob.arrayBuffer();
    await ffmpeg.writeFile(name, new Uint8Array(buf));
    frameFiles.push(name);
  }

  for (let s = 0; s < imgs.length; s++) {
    const img  = imgs[s];
    const next = imgs[s + 1] || null;

    // slide body frames
    for (let f = 0; f < framesPerSlide; f++) {
      const p = f / (framesPerSlide - 1 || 1);
      ctx.clearRect(0, 0, resWidth, resHeight);
      renderSlideFrame(ctx, img, resWidth, resHeight, p);
      await writeFrame(`frame${String(frameIdx).padStart(6,'0')}.jpg`);
      frameIdx++;
      if (frameIdx % 10 === 0) setProgress(0.25 + 0.25 * (frameIdx / totalFrames));
    }

    // crossfade transition frames
    if (next) {
      for (let f = 0; f < framesPerTrans; f++) {
        const alpha = f / (framesPerTrans - 1 || 1); // 0=cur,1=next
        const p_cur  = 1.0;
        const p_next = 0.0;
        ctx.clearRect(0, 0, resWidth, resHeight);
        // draw current slide at end position
        renderSlideFrame(ctx, img, resWidth, resHeight, p_cur);
        // overlay next slide at start position with increasing opacity
        ctx.globalAlpha = alpha;
        renderSlideFrame(ctx, next, resWidth, resHeight, p_next);
        ctx.globalAlpha = 1.0;
        await writeFrame(`frame${String(frameIdx).padStart(6,'0')}.jpg`);
        frameIdx++;
        if (frameIdx % 10 === 0) setProgress(0.25 + 0.25 * (frameIdx / totalFrames));
      }
    }
  }

  setProgress(0.5);
  progressLbl.textContent = 'Encoding video…';

  // Build ffmpeg command
  const ffArgs = [
    '-framerate', String(fps),
    '-i', 'frame%06d.jpg',
  ];

  if (musicFile) {
    const musicBytes = await fetchFile(musicFile);
    await ffmpeg.writeFile('music_input', musicBytes);
    ffArgs.push('-i', 'music_input');
  }

  const totalDuration = slideDur * imgs.length + transDur * Math.max(0, imgs.length - 1);

  ffArgs.push(
    '-c:v', 'libx264',
    '-preset', 'fast',
    '-crf', '22',
    '-pix_fmt', 'yuv420p',
    '-t', String(totalDuration),
  );

  if (musicFile) {
    ffArgs.push(
      '-c:a', 'aac',
      '-b:a', '192k',
      '-af', `afade=t=out:st=${Math.max(0, totalDuration - 2)}:d=2,volume=${musicVol}`,
      '-shortest',
    );
  }

  ffArgs.push('-movflags', '+faststart', 'output.mp4');

  await ffmpeg.exec(ffArgs);

  setProgress(0.97);
  progressLbl.textContent = 'Packaging…';

  const data = await ffmpeg.readFile('output.mp4');
  outputBlob = new Blob([data.buffer], { type: 'video/mp4' });

  // clean up ffmpeg FS
  for (const name of frameFiles) {
    try { await ffmpeg.deleteFile(name); } catch {}
  }
  try { await ffmpeg.deleteFile('output.mp4'); } catch {}
  if (musicFile) { try { await ffmpeg.deleteFile('music_input'); } catch {} }

  setProgress(1.0);
  progressLbl.textContent = 'Done!';

  const url = URL.createObjectURL(outputBlob);
  video.src = url;
  video.play().catch(() => {});

  progressWrap.style.display = 'none';
  videoWrap.style.display    = 'block';
  btnDownload.disabled       = false;
  btnRebuild.style.display   = 'inline-block';
  rendering = false;
}

// Rebuild with new options
btnRebuild.onclick = () => {
  videoWrap.style.display  = 'none';
  progressWrap.style.display = 'flex';
  optPanel.style.display   = 'none';
  startRender();
};

// Download
btnDownload.onclick = () => {
  if (!outputBlob) return;
  const a = document.createElement('a');
  a.href     = URL.createObjectURL(outputBlob);
  a.download = 'collagify.mp4';
  a.click();
};
</script>
</body>
</html>
